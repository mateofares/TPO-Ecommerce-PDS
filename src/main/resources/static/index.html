<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Market</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════════════════════ -->
  <header>
    <div class="header-inner">
      <div class="logo">E-Market</div>

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar productos..." />
        <select id="searchCategory">
          <option value="">Todas las categorías</option>
        </select>
        <div class="price-range">
          <input type="number" id="priceMin" placeholder="$ Mín" />
          <span>—</span>
          <input type="number" id="priceMax" placeholder="$ Máx" />
        </div>
        <button onclick="buscarProductos()">Buscar</button>
      </div>

      <div class="header-actions">
        <button class="btn-cart" onclick="toggleCarrito()">
          🛒 <span id="cartBadge" class="badge hidden">0</span>
        </button>
        <div id="userArea">
          <button class="btn-outline" onclick="abrirModal('modalLogin')">Ingresar</button>
          <button class="btn-primary" onclick="abrirModal('modalRegistro')">Registrarse</button>
        </div>
        <div id="userMenu" class="user-menu hidden">
          <span id="userNameDisplay"></span>
          <div class="user-dropdown">
            <button onclick="mostrarSeccion('pedidos')">Mis Pedidos</button>
            <button id="btnAdmin" class="hidden" onclick="mostrarSeccion('admin')">Panel Admin</button>
            <button onclick="cerrarSesion()">Cerrar Sesión</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══ MAIN ══════════════════════════════════════════════════════════════ -->
  <main>
    <aside class="sidebar">
      <h3>Categorías</h3>
      <ul id="categoriaList"></ul>
    </aside>

    <!-- CATÁLOGO -->
    <section id="seccionCatalogo" class="content">
      <h2 id="catalogoTitulo">Todos los productos</h2>
      <div id="productoGrid" class="product-grid"></div>
    </section>

    <!-- MIS PEDIDOS -->
    <section id="seccionPedidos" class="content hidden">
      <h2>Mis Pedidos</h2>
      <div id="misPedidosList"></div>
    </section>

    <!-- PANEL ADMIN -->
    <section id="seccionAdmin" class="content hidden">
      <h2>Panel de Administración</h2>
      <div id="todosLosPedidosList"></div>
    </section>
  </main>

  <!-- ═══ CARRITO (panel lateral) ═══════════════════════════════════════════ -->
  <div id="carritoPanel" class="carrito-panel hidden">
    <div class="carrito-header">
      <h3>🛒 Carrito</h3>
      <button class="btn-close" onclick="toggleCarrito()">✕</button>
    </div>
    <div id="carritoItems" class="carrito-items"></div>
    <div class="carrito-footer">
      <div class="total-row">
        <strong>Total:</strong>
        <span id="carritoTotal">$0.00</span>
      </div>
      <button class="btn-primary full-width" onclick="irACheckout()">Confirmar compra</button>
    </div>
  </div>
  <div id="overlay" class="overlay hidden" onclick="cerrarTodo()"></div>

  <!-- ═══ MODALES ═══════════════════════════════════════════════════════════ -->

  <!-- LOGIN -->
  <div id="modalLogin" class="modal hidden">
    <div class="modal-box">
      <button class="btn-close" onclick="cerrarModal('modalLogin')">✕</button>
      <h2>Iniciar sesión</h2>
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" />
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" />
      <p id="loginError" class="error-msg hidden"></p>
      <button class="btn-primary full-width" onclick="login()">Ingresar</button>
      <p class="link-text">¿No tenés cuenta? <a onclick="switchModal('modalLogin','modalRegistro')">Registrate</a></p>
    </div>
  </div>

  <!-- REGISTRO -->
  <div id="modalRegistro" class="modal hidden">
    <div class="modal-box">
      <button class="btn-close" onclick="cerrarModal('modalRegistro')">✕</button>
      <h2>Crear cuenta</h2>
      <div class="form-row">
        <div>
          <label>Nombre</label>
          <input type="text" id="regNombre" placeholder="Juan" />
        </div>
        <div>
          <label>Apellido</label>
          <input type="text" id="regApellido" placeholder="Pérez" />
        </div>
      </div>
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="correo@ejemplo.com" />
      <label>Contraseña</label>
      <input type="password" id="regPass" placeholder="••••••••" />
      <label>Rol</label>
      <select id="regRol">
        <option value="cliente">Cliente</option>
        <option value="admin">Administrador</option>
      </select>
      <div id="legajoField" class="hidden">
        <label>Legajo</label>
        <input type="number" id="regLegajo" placeholder="1001" />
      </div>
      <p id="regError" class="error-msg hidden"></p>
      <button class="btn-primary full-width" onclick="registrar()">Crear cuenta</button>
      <p class="link-text">¿Ya tenés cuenta? <a onclick="switchModal('modalRegistro','modalLogin')">Ingresar</a></p>
    </div>
  </div>

  <!-- CHECKOUT -->
  <div id="modalCheckout" class="modal hidden">
    <div class="modal-box">
      <button class="btn-close" onclick="cerrarModal('modalCheckout')">✕</button>
      <h2>Confirmar compra</h2>
      <div id="checkoutResumen" class="checkout-resumen"></div>
      <h3>Método de pago</h3>
      <div class="payment-options">
        <label class="payment-card" onclick="seleccionarPago('tarjeta')">
          <input type="radio" name="pago" value="tarjeta" />
          <div>💳 <strong>Tarjeta de Crédito</strong></div>
        </label>
        <label class="payment-card" onclick="seleccionarPago('paypal')">
          <input type="radio" name="pago" value="paypal" />
          <div>🅿 <strong>PayPal</strong></div>
        </label>
        <label class="payment-card" onclick="seleccionarPago('transferencia')">
          <input type="radio" name="pago" value="transferencia" />
          <div>🏦 <strong>Transferencia Bancaria</strong></div>
        </label>
      </div>
      <div id="pagoFormTarjeta" class="pago-form hidden">
        <input type="text" id="cardNumero" placeholder="Número de tarjeta (16 dígitos)" maxlength="16" />
        <input type="text" id="cardCVV" placeholder="CVV" maxlength="4" />
      </div>
      <div id="pagoFormPaypal" class="pago-form hidden">
        <input type="email" id="ppCuenta" placeholder="Cuenta PayPal" />
        <input type="text" id="ppToken" placeholder="Token PayPal" />
      </div>
      <div id="pagoFormTransferencia" class="pago-form hidden">
        <input type="text" id="transCBU" placeholder="CBU (22 dígitos)" maxlength="22" />
        <input type="text" id="transBanco" placeholder="Banco" />
      </div>
      <p id="checkoutError" class="error-msg hidden"></p>
      <button class="btn-primary full-width" onclick="confirmarCompra()">Pagar</button>
    </div>
  </div>

  <!-- NOTIFICACIÓN TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
