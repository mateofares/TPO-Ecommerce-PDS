spring.application.name=emarket

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.odmwjsjyvgtpctoxghza
spring.datasource.password=contraPDS_12

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# create-drop: borra y recrea las tablas cada vez que arranca (útil para desarrollo/demo)
# Cambiar a "update" cuando no quieran perder datos entre reinicios
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# HikariCP: limitar pool para no exceder el límite de Supabase (15 sesiones)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ── Serialización JSON ────────────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
